<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Steady</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #111110;
    --panel: #171716;
    --border: #2a2a28;
    --text: #ece9e4;
    --text-dim: #9a968f;
    --accent: #7eb89a;
    --accent-dim: #4f7d68;
    --danger: #c97b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(126,184,154,0.08), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(216,185,120,0.05), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 48px 24px 96px; }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 40px;
    margin: 0 0 4px;
    display: inline-block;
    background-image: linear-gradient(100deg, var(--text) 30%, var(--accent) 75%, #d8b978);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }
  .tagline { color: var(--text-dim); margin: 0 0 32px; font-size: 14px; }

  .panel {
    background: linear-gradient(160deg, #1b1b19 0%, var(--panel) 45%, #141413 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  /* Heatmap: 28 days of review activity, GitHub-style intensity grid */
  .heatmap-panel { background: linear-gradient(135deg, #172a30 0%, #1a2035 55%, #111110 100%); border-color: #2d3a3f; }
  .heatmap { display: grid; grid-template-columns: repeat(14, 1fr); gap: 4px; }
  .heat-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .heat-cell:hover { transform: scale(1.15); }
  .heat-cell.heat-1 { background: linear-gradient(160deg, rgba(126,184,154,0.35), rgba(45,110,120,0.25)); border-color: transparent; }
  .heat-cell.heat-2 { background: linear-gradient(160deg, rgba(126,184,154,0.65), rgba(45,110,120,0.5)); border-color: transparent; }
  .heat-cell.heat-3 {
    background: linear-gradient(160deg, #d8b978, #7eb89a);
    border-color: transparent;
    box-shadow: 0 0 10px rgba(216,185,120,0.4);
  }
  .heatmap-label { color: var(--text-dim); font-size: 11px; margin-top: 10px; display: flex; justify-content: space-between; }

  /* Calendar: forward-looking due dates */
  .panel.cal-panel {
    background: linear-gradient(135deg, #17302b 0%, #241a2e 55%, #111110 100%);
    border-color: #33302f;
  }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    padding-bottom: 4px;
    background-image: linear-gradient(90deg, var(--accent), #d8b978);
    background-size: 100% 2px;
    background-repeat: no-repeat;
    background-position: 0 100%;
  }
  .cal-nav {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px; height: 28px; border-radius: 6px; padding: 0;
    font-size: 16px; line-height: 1; cursor: pointer;
  }
  .cal-nav:hover { border-color: var(--accent-dim); color: var(--text); }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7,1fr);
    text-align: center; color: var(--text-dim); font-size: 11px; margin-bottom: 6px;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
    font-size: 12px;
    color: var(--text-dim);
    transition: background 0.3s, box-shadow 0.3s, border-color 0.3s, transform 0.15s;
  }
  .cal-day.empty { border-color: transparent; background: transparent; }
  .cal-day.today {
    border-color: var(--accent);
    color: var(--text);
    font-weight: 600;
    animation: cal-pulse 2.4s ease-in-out infinite;
  }
  @keyframes cal-pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(126,184,154,0.12); }
    50% { box-shadow: 0 0 0 5px rgba(126,184,154,0.22); }
  }
  .cal-day.due-1 { background: linear-gradient(160deg, rgba(126,184,154,0.28), rgba(79,125,104,0.22)); color: var(--text); }
  .cal-day.due-2 {
    background: linear-gradient(160deg, rgba(126,184,154,0.5), rgba(45,110,120,0.4));
    color: var(--text); border-color: var(--accent-dim);
  }
  .cal-day.due-3 {
    background: linear-gradient(160deg, #7eb89a, #2d6e78);
    color: #0d1410; font-weight: 600; border-color: var(--accent);
    box-shadow: 0 0 14px rgba(126,184,154,0.35);
  }
  .cal-day.overdue-1 { background: linear-gradient(160deg, rgba(201,123,107,0.3), rgba(160,80,60,0.22)); color: var(--text); }
  .cal-day.overdue-2 {
    background: linear-gradient(160deg, rgba(201,123,107,0.55), rgba(180,90,40,0.4));
    color: var(--text); border-color: var(--danger);
  }
  .cal-day.overdue-3 {
    background: linear-gradient(160deg, #e0947f, #b5502f);
    color: #1a0f0d; font-weight: 600; border-color: var(--danger);
    box-shadow: 0 0 14px rgba(201,123,107,0.4);
  }
  .cal-day.has-due { cursor: pointer; }
  .cal-day.has-due:hover { transform: scale(1.07); box-shadow: 0 4px 14px rgba(0,0,0,0.35); }
  .cal-day.selected { outline: 2px solid var(--text); outline-offset: 1px; }
  .cal-badge {
    position: absolute; top: 3px; right: 3px; font-size: 9px; font-weight: 700;
    background: rgba(0,0,0,0.35); border-radius: 999px;
    min-width: 14px; height: 14px; padding: 0 3px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Calendar day-detail: appears below the grid when a due day is clicked */
  .cal-detail {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px dashed rgba(255,255,255,0.12);
  }
  .cal-detail-title { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
  .cal-detail-topic {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
  }
  .cal-detail-topic + .cal-detail-topic { border-top: 1px solid rgba(255,255,255,0.06); }
  .cal-detail-quality { display: flex; gap: 4px; }

  .panel.add-panel { background: linear-gradient(160deg, #241c17 0%, var(--panel) 45%, #141413 100%); border-color: #3a2f24; }
  form.add-topic { display: flex; gap: 8px; flex-wrap: wrap; }
  input[type="text"] {
    flex: 1;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
  }
  input[type="text"]:focus { outline: none; border-color: var(--accent-dim); }
  select.project-picker {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    max-width: 160px;
  }
  select.project-picker:focus { outline: none; border-color: var(--accent-dim); }
  button {
    background: linear-gradient(135deg, var(--accent), #4f9d8f);
    color: #0d1410;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  }
  button:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(126,184,154,0.3); }
  button.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    box-shadow: none;
  }
  button.ghost:hover { border-color: var(--accent-dim); color: var(--text); transform: none; box-shadow: none; filter: none; }

  .topic {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 12px 14px 14px;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 0 8px 8px 0;
    margin-bottom: 2px;
    transition: background 0.15s, border-color 0.15s;
  }
  .topic:hover { background: rgba(255,255,255,0.02); }
  .topic.status-overdue { border-left-color: var(--danger); }
  .topic.status-today { border-left-color: var(--accent); }
  .topic:last-child { border-bottom: none; }
  .topic-title { font-size: 15px; }
  .topic-meta { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
  .topic-due { font-size: 12px; padding: 3px 8px; border-radius: 999px; background: rgba(126,184,154,0.15); color: var(--accent); }
  .topic-due.overdue { background: rgba(201,123,107,0.15); color: var(--danger); }
  .topic-right { display: flex; align-items: center; gap: 10px; }
  .pushed-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex: none; }
  .archive-btn {
    background: transparent; border: none; color: var(--text-dim);
    font-size: 16px; cursor: pointer; padding: 2px 4px; line-height: 1;
  }
  .archive-btn:hover { color: var(--danger); }
  .archive-confirm-row { display: flex; align-items: center; gap: 6px; }
  .archive-confirm {
    background: linear-gradient(135deg, var(--danger), #a0503c);
    color: #1a0f0d; border: none; padding: 5px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .archive-cancel {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
  }
  .archive-cancel:hover { border-color: var(--accent-dim); color: var(--text); }

  .quality-row { display: none; gap: 6px; margin-top: 10px; }
  .quality-row.open { display: flex; }
  .qbtn {
    width: 30px; height: 30px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid transparent; color: var(--text);
    transition: transform 0.15s, filter 0.15s;
  }
  .qbtn:hover { transform: translateY(-2px); filter: brightness(1.15); }
  .qbtn[data-q="0"], .qbtn[data-q="1"] { background: linear-gradient(160deg, rgba(201,123,107,0.5), rgba(160,80,60,0.35)); }
  .qbtn[data-q="2"] { background: linear-gradient(160deg, rgba(216,166,120,0.5), rgba(170,110,50,0.35)); }
  .qbtn[data-q="3"] { background: linear-gradient(160deg, rgba(216,185,120,0.5), rgba(126,184,154,0.3)); }
  .qbtn[data-q="4"] { background: linear-gradient(160deg, rgba(126,184,154,0.65), rgba(45,110,120,0.45)); }
  .qbtn[data-q="5"] { background: linear-gradient(160deg, #7eb89a, #2d6e78); box-shadow: 0 0 8px rgba(126,184,154,0.35); }

  .empty { color: var(--text-dim); font-size: 14px; padding: 24px 0; text-align: center; }

  /* Category manager */
  .cat-manager summary {
    cursor: pointer; color: var(--text-dim); font-size: 13px; user-select: none;
  }
  .cat-manager summary:hover { color: var(--text); }
  .cat-manager-body { margin-top: 14px; }
  form.add-category { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .cat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-name { cursor: pointer; }
  .cat-name:hover { color: var(--accent); }
  .cat-edit-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding: 8px 0; }

  /* Grouped topic list */
  .cat-header {
    color: var(--text-dim); font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 14px 0 6px; border-bottom: 1px solid var(--border);
  }
  .cat-header:first-child { padding-top: 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Steady</h1>
  <p class="tagline">Log what you studied. Steady tells you when to look at it again.</p>

  <div class="panel heatmap-panel">
    <div class="heatmap" id="heatmap"></div>
    <div class="heatmap-label"><span>28 days ago</span><span>today</span></div>
  </div>

  <div class="panel cal-panel">
    <div class="cal-header">
      <button type="button" class="cal-nav" id="calPrev" aria-label="Previous month">&lsaquo;</button>
      <div class="cal-title" id="calTitle"></div>
      <button type="button" class="cal-nav" id="calNext" aria-label="Next month">&rsaquo;</button>
    </div>
    <div class="cal-weekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-detail" id="calDetail" style="display:none"></div>
  </div>

  <div class="panel add-panel">
    <form class="add-topic" id="addForm">
      <input type="text" id="titleInput" placeholder="What did you study today?" required />
      <select class="project-picker" id="categoryPicker"><option value="">Uncategorized</option></select>
      <select class="project-picker" id="projectPicker" style="display:none"></select>
      <button type="submit">Add</button>
    </form>
  </div>

  <details class="panel cat-manager">
    <summary>Manage categories</summary>
    <div class="cat-manager-body">
      <form class="add-category" id="addCategoryForm">
        <input type="text" id="categoryNameInput" placeholder="New category name" required />
        <select class="project-picker" id="categoryParentPicker"><option value="">Top level</option></select>
        <select class="project-picker" id="categoryTodoistPicker" style="display:none"></select>
        <button type="submit" class="ghost">Add category</button>
      </form>
      <div id="categoryManagerList"></div>
    </div>
  </details>

  <div class="panel">
    <div id="topicList"></div>
  </div>
</div>

<script>
  // Same-origin API served by the Worker. Falls back to localStorage if
  // the API isn't reachable (e.g. opening this file directly, no backend yet).
  const API = '/api';
  let useLocal = false;
  let localTopics = JSON.parse(localStorage.getItem('steady_topics') || '[]');
  let localCategories = JSON.parse(localStorage.getItem('steady_categories') || '[]');
  let projectsById = {};

  function saveLocal() {
    localStorage.setItem('steady_topics', JSON.stringify(localTopics));
  }

  function saveLocalCategories() {
    localStorage.setItem('steady_categories', JSON.stringify(localCategories));
  }

  // Single-user app, user is on IST (UTC+5:30, no DST) — see CLAUDE.md.
  // Anchoring on IST instead of raw UTC matters: without it, the app thinks
  // it's still yesterday until 5:30am local time.
  const IST_OFFSET_MS = 5.5 * 60 * 60 * 1000;
  function nowIST() {
    return new Date(Date.now() + IST_OFFSET_MS);
  }
  function todayISO() {
    return nowIST().toISOString().slice(0, 10);
  }

  function sm2(prev, quality, elapsedDays) {
    let { ef, interval_days, repetitions } = prev;
    if (quality < 3) {
      repetitions = 0;
      interval_days = 1;
    } else {
      repetitions += 1;
      if (repetitions === 1) interval_days = 1;
      else if (repetitions === 2) interval_days = 6;
      else {
        // Mirrors worker/index.js's sm2() exactly — see CLAUDE.md for the
        // SM-4-sourced derivation of this elapsed-time correction.
        const naive = interval_days * ef;
        const oiPrime = elapsedDays + (elapsedDays * (1 - 1 / ef)) / 2 * (0.25 * quality - 1);
        const FRACTION = 0.3;
        const blended = (1 - FRACTION) * naive + FRACTION * oiPrime;
        interval_days = Math.max(interval_days, Math.round(blended));
      }
    }
    ef = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
    if (ef < 1.3) ef = 1.3;
    const next = nowIST();
    next.setUTCDate(next.getUTCDate() + interval_days);
    return { ef, interval_days, repetitions, next_due: next.toISOString().slice(0, 10) };
  }

  async function apiFetch(path, opts) {
    try {
      const res = await fetch(API + path, opts);
      if (!res.ok) throw new Error('api error');
      return await res.json();
    } catch (e) {
      useLocal = true;
      throw e;
    }
  }

  /**
   * Like apiFetch, but for writes that have real validation the user can
   * trigger (e.g. the category cycle guard) — apiFetch treats every non-OK
   * response as "API unreachable, fall back to localStorage," which would
   * silently discard a legitimate rejection and duplicate the write locally.
   * This distinguishes "unreachable" (falls back) from "reachable but
   * rejected" (surfaces the real error, does NOT fall back).
   */
  async function apiPost(path, method, body) {
    try {
      const res = await fetch(API + path, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: body !== undefined ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        if (res.status >= 500) useLocal = true;
        return { ok: false, error: data.error || 'request failed' };
      }
      return { ok: true, data };
    } catch (e) {
      useLocal = true;
      return { ok: false, error: 'network error', networkFailure: true };
    }
  }

  async function loadTopics() {
    if (!useLocal) {
      try { return await apiFetch('/topics'); } catch (e) { /* fall through */ }
    }
    return localTopics
      .filter((t) => !t.archived)
      .sort((a, b) => a.next_due.localeCompare(b.next_due));
  }

  async function loadStats() {
    if (!useLocal) {
      try { return await apiFetch('/stats'); } catch (e) { /* fall through */ }
    }
    const days = [];
    const reviewDates = localTopics.flatMap((t) => t.reviewLog || []);
    for (let i = 27; i >= 0; i--) {
      const d = nowIST();
      d.setUTCDate(d.getUTCDate() - i);
      const key = d.toISOString().slice(0, 10);
      days.push({ day: key, count: reviewDates.filter((r) => r === key).length });
    }
    return days;
  }

  let calMonth = todayISO().slice(0, 7);
  let calDays = {};
  let selectedCalDay = null;

  async function loadCalendar(month) {
    if (!useLocal) {
      try { return await apiFetch(`/calendar?month=${month}`); } catch (e) { /* fall through */ }
    }
    const days = {};
    for (const t of localTopics) {
      if (t.archived) continue;
      if (t.next_due && t.next_due.startsWith(month)) {
        (days[t.next_due] ||= []).push({ id: t.id, title: t.title });
      }
    }
    return { month, days };
  }

  function shiftMonth(month, delta) {
    const [y, m] = month.split('-').map(Number);
    const d = new Date(Date.UTC(y, m - 1 + delta, 1));
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
  }

  function renderCalendar({ month, days }) {
    const [y, m] = month.split('-').map(Number);
    document.getElementById('calTitle').textContent =
      new Date(Date.UTC(y, m - 1, 1)).toLocaleDateString('en-US', { month: 'long', year: 'numeric', timeZone: 'UTC' });

    const firstWeekday = new Date(Date.UTC(y, m - 1, 1)).getUTCDay();
    const daysInMonth = new Date(Date.UTC(y, m, 0)).getUTCDate();
    const today = todayISO();

    let html = '';
    for (let i = 0; i < firstWeekday; i++) html += '<div class="cal-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${month}-${String(d).padStart(2, '0')}`;
      const due = days[dateStr] || [];
      const count = due.length;
      const isToday = dateStr === today;
      const isOverdue = dateStr < today && count > 0;
      const tier = count === 0 ? 0 : count <= 1 ? 1 : count <= 3 ? 2 : 3;
      const classes = ['cal-day'];
      if (isToday) classes.push('today');
      if (tier > 0) classes.push(isOverdue ? `overdue-${tier}` : `due-${tier}`, 'has-due');
      if (dateStr === selectedCalDay) classes.push('selected');
      const badge = count > 3 ? `<div class="cal-badge">${count}</div>` : '';
      const titleAttr = due.length ? ` title="${escapeHtml(due.map((t) => t.title).join('\n'))}"` : '';
      const dateAttr = due.length ? ` data-date="${dateStr}"` : '';
      html += `<div class="${classes.join(' ')}"${titleAttr}${dateAttr}><span>${d}</span>${badge}</div>`;
    }
    document.getElementById('calGrid').innerHTML = html;
  }

  function renderCalDetail() {
    const detail = document.getElementById('calDetail');
    const due = selectedCalDay ? (calDays[selectedCalDay] || []) : [];
    if (!selectedCalDay || !due.length) {
      detail.style.display = 'none';
      detail.innerHTML = '';
      return;
    }
    const today = todayISO();
    const actionable = selectedCalDay <= today; // today or overdue: can review right here
    detail.style.display = '';
    detail.innerHTML = `
      <div class="cal-detail-title">${due.length} due ${selectedCalDay}${actionable ? '' : ' (not due yet)'}</div>
      ${due.map((t) => `
        <div class="cal-detail-topic" data-detail-id="${t.id}">
          <span>${escapeHtml(t.title)}</span>
          ${actionable
            ? `<div class="cal-detail-quality">${[0, 1, 2, 3, 4, 5].map((q) => `<button type="button" class="qbtn" data-q="${q}" data-id="${t.id}" data-detail-review="1">${q}</button>`).join('')}</div>`
            : ''}
        </div>`).join('')}
    `;
  }

  async function refreshCalendar() {
    const result = await loadCalendar(calMonth);
    calDays = result.days || {};
    renderCalendar(result);
    renderCalDetail();
  }

  // Best-effort only: a missing/unconfigured Todoist token shouldn't flip
  // the whole app into localStorage mode, so this doesn't touch `useLocal`.
  async function loadTodoistProjects() {
    try {
      const res = await fetch(API + '/todoist/projects');
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    }
  }

  async function addTopic(title, todoistProjectId, categoryId) {
    if (!useLocal) {
      try { return await apiFetch('/topics', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, todoist_project_id: todoistProjectId || undefined, category_id: categoryId || undefined }),
      }); } catch (e) { /* fall through */ }
    }
    const topic = {
      id: Date.now(), title, ef: 2.5, interval_days: 0, repetitions: 0,
      category_id: categoryId ? Number(categoryId) : null,
      next_due: todayISO(), last_reviewed: null, archived: 0, reviewLog: [],
    };
    localTopics.push(topic);
    saveLocal();
    return topic;
  }

  async function archiveTopic(id) {
    if (!useLocal) {
      try { return await apiFetch(`/topics/${id}`, { method: 'DELETE' }); } catch (e) { /* fall through */ }
    }
    const topic = localTopics.find((t) => t.id === id);
    if (topic) { topic.archived = 1; saveLocal(); }
  }

  async function setTopicCategory(id, categoryId) {
    if (!useLocal) {
      const result = await apiPost(`/topics/${id}/category`, 'POST', { category_id: categoryId || undefined });
      if (result.ok) return { ok: true };
      if (!result.networkFailure) return result; // real validation error — don't fall back
    }
    const topic = localTopics.find((t) => t.id === id);
    if (topic) { topic.category_id = categoryId ? Number(categoryId) : null; saveLocal(); }
    return { ok: true };
  }

  // --- Categories ---------------------------------------------------------

  async function loadCategories() {
    if (!useLocal) {
      try { return await apiFetch('/categories'); } catch (e) { /* fall through */ }
    }
    return localCategories.filter((c) => !c.archived);
  }

  /**
   * Pure helper: given a flat category list, returns a byId map and a
   * pre-order traversal (root-first, children immediately after their
   * parent) with each entry tagged with its depth. Reused by both the
   * picker population and the grouped topic-list renderer, so the tree
   * walk exists exactly once.
   */
  function buildCategoryTree(categories) {
    const byId = Object.fromEntries(categories.map((c) => [c.id, c]));
    const childrenOf = {};
    for (const c of categories) {
      const key = c.parent_id ?? 'root';
      (childrenOf[key] ||= []).push(c);
    }
    const order = [];
    (function walk(parentKey, depth) {
      for (const c of childrenOf[parentKey] || []) {
        order.push({ id: c.id, category: c, depth });
        walk(c.id, depth + 1);
      }
    })('root', 0);
    return { byId, order };
  }

  async function addCategory(name, parentId, todoistProjectId) {
    if (!useLocal) {
      const result = await apiPost('/categories', 'POST', { name, parent_id: parentId || undefined, todoist_project_id: todoistProjectId || undefined });
      if (result.ok) return result.data;
      if (!result.networkFailure) return result; // real validation error — don't fall back
    }
    const category = {
      id: Date.now(), name, parent_id: parentId ? Number(parentId) : null,
      todoist_project_id: todoistProjectId || null, archived: 0,
    };
    localCategories.push(category);
    saveLocalCategories();
    return category;
  }

  async function updateCategory(id, changes) {
    if (!useLocal) {
      const result = await apiPost(`/categories/${id}`, 'POST', changes);
      if (result.ok) return result.data;
      if (!result.networkFailure) return result; // real validation error (e.g. cycle) — don't fall back
    }
    const category = localCategories.find((c) => c.id === id);
    if (category) {
      if (changes.name !== undefined) category.name = changes.name;
      if (changes.parent_id !== undefined) category.parent_id = changes.parent_id ? Number(changes.parent_id) : null;
      if (changes.todoist_project_id !== undefined) category.todoist_project_id = changes.todoist_project_id || null;
      saveLocalCategories();
    }
    return category;
  }

  // Mirrors the server's safe-archive guard (worker/index.js DELETE
  // /api/categories/:id) for the localStorage fallback mode — this app is
  // explicitly designed to run standalone, so the guard needs a copy here
  // too, not just server-side. Returns { ok: true } or { ok: false, error }.
  async function archiveCategory(id) {
    if (!useLocal) {
      const result = await apiPost(`/categories/${id}`, 'DELETE');
      if (result.ok) return { ok: true };
      if (!result.networkFailure) return result;
    }
    const childCount = localCategories.filter((c) => c.parent_id === id && !c.archived).length;
    const topicCount = localTopics.filter((t) => t.category_id === id && !t.archived).length;
    if (childCount > 0 || topicCount > 0) {
      const reasons = [];
      if (childCount > 0) reasons.push(`${childCount} active subcategor${childCount === 1 ? 'y' : 'ies'}`);
      if (topicCount > 0) reasons.push(`${topicCount} active topic${topicCount === 1 ? '' : 's'}`);
      return { ok: false, error: `Cannot archive: ${reasons.join(' and ')} still reference this category. Reassign or archive them first.` };
    }
    const category = localCategories.find((c) => c.id === id);
    if (category) { category.archived = 1; saveLocalCategories(); }
    return { ok: true };
  }

  async function reviewTopic(id, quality) {
    if (!useLocal) {
      try { return await apiFetch(`/topics/${id}/review`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quality }),
      }); } catch (e) { /* fall through */ }
    }
    const topic = localTopics.find((t) => t.id === id);
    const elapsedDays = topic.last_reviewed
      ? Math.round((Date.parse(todayISO()) - Date.parse(topic.last_reviewed)) / 86400000)
      : 0;
    const after = sm2(topic, quality, elapsedDays);
    Object.assign(topic, after);
    topic.last_reviewed = todayISO();
    topic.reviewLog = topic.reviewLog || [];
    topic.reviewLog.push(todayISO());
    saveLocal();
    return topic;
  }

  function renderHeatmap(days) {
    const heatmap = document.getElementById('heatmap');
    heatmap.innerHTML = days
      .map((d) => {
        const tier = d.count === 0 ? 0 : d.count <= 1 ? 1 : d.count <= 3 ? 2 : 3;
        const cls = tier > 0 ? `heat-cell heat-${tier}` : 'heat-cell';
        return `<div class="${cls}" title="${d.day}: ${d.count} review${d.count === 1 ? '' : 's'}"></div>`;
      })
      .join('');
  }

  let lastTopics = [];
  let lastCategories = [];
  let confirmingArchiveId = null;

  function renderTopicRow(t, today) {
    const overdue = t.next_due < today ? 'overdue' : '';
    const dueLabel = t.next_due === today ? 'due today' : t.next_due < today ? 'overdue' : `due ${t.next_due}`;
    const statusClass = t.next_due < today ? 'status-overdue' : t.next_due === today ? 'status-today' : '';
    const projectName = t.todoist_project_id ? projectsById[t.todoist_project_id] : null;
    const metaBits = [`EF ${t.ef.toFixed(2)}`, `${t.repetitions} review${t.repetitions === 1 ? '' : 's'}`];
    if (projectName) metaBits.push(`→ ${escapeHtml(projectName)}`);
    const archiveControl = confirmingArchiveId === t.id
      ? `<div class="archive-confirm-row">
           <button type="button" class="archive-confirm" data-confirm-archive="${t.id}">Delete?</button>
           <button type="button" class="archive-cancel" data-cancel-archive="${t.id}">Cancel</button>
         </div>`
      : `<button type="button" class="archive-btn" data-archive="${t.id}" title="Archive">&times;</button>`;
    return `
      <div class="topic ${statusClass}" data-id="${t.id}">
        <div style="flex:1">
          <div class="topic-title">${escapeHtml(t.title)}</div>
          <div class="topic-meta">${metaBits.join(' · ')}</div>
          <div class="quality-row" id="qrow-${t.id}">
            ${[0, 1, 2, 3, 4, 5].map((q) => `<button class="qbtn" data-q="${q}" data-id="${t.id}">${q}</button>`).join('')}
          </div>
        </div>
        <div class="topic-right">
          ${t.todoist_task_id ? '<div class="pushed-dot" title="Pushed to Todoist"></div>' : ''}
          <div class="topic-due ${overdue}" data-toggle="${t.id}" style="cursor:pointer">${dueLabel}</div>
          ${archiveControl}
        </div>
      </div>`;
  }

  function renderTopics(topics, categories) {
    lastTopics = topics;
    if (categories) lastCategories = categories;
    const list = document.getElementById('topicList');
    if (!topics.length) {
      list.innerHTML = '<div class="empty">No topics yet. Add something you studied today.</div>';
      return;
    }
    const today = todayISO();

    // No category ever created: exact flat list, zero visible change from
    // before this feature existed — no stray "Uncategorized" header either.
    if (!lastCategories.length) {
      list.innerHTML = topics.map((t) => renderTopicRow(t, today)).join('');
      return;
    }

    const { byId, order } = buildCategoryTree(lastCategories);
    const byCategoryId = {};
    const uncategorized = [];
    for (const t of topics) {
      if (t.category_id && byId[t.category_id]) (byCategoryId[t.category_id] ||= []).push(t);
      else uncategorized.push(t);
    }

    // Ancestors of any category holding topics also get a header, even with
    // zero topics directly in them (pure "folder" categories).
    const idsToRender = new Set();
    for (const catId of Object.keys(byCategoryId)) {
      let cur = byId[catId];
      while (cur) {
        idsToRender.add(cur.id);
        cur = cur.parent_id ? byId[cur.parent_id] : null;
      }
    }

    let html = '';
    if (uncategorized.length) {
      html += `<div class="cat-header">Uncategorized</div>`;
      html += uncategorized.map((t) => renderTopicRow(t, today)).join('');
    }
    for (const { id, category, depth } of order) {
      if (!idsToRender.has(id)) continue;
      html += `<div class="cat-header" style="padding-left:${depth * 16}px">${escapeHtml(category.name)}</div>`;
      html += (byCategoryId[id] || []).map((t) => renderTopicRow(t, today)).join('');
    }
    list.innerHTML = html;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // --- Category manager UI -------------------------------------------------

  let todoistProjects = null; // cached from loadTodoistProjects(), shared by the topic and category pickers
  let editingCategoryId = null;
  let confirmingCategoryArchiveId = null;
  let categoryError = null;

  function renderCategoryPickers(categories) {
    const { order } = buildCategoryTree(categories);
    const options = order
      .map(({ category, depth }) => `<option value="${category.id}">${'  '.repeat(depth)}${escapeHtml(category.name)}</option>`)
      .join('');

    const topicPicker = document.getElementById('categoryPicker');
    const selectedTopic = topicPicker.value;
    topicPicker.innerHTML = '<option value="">Uncategorized</option>' + options;
    topicPicker.value = selectedTopic;

    const parentPicker = document.getElementById('categoryParentPicker');
    const selectedParent = parentPicker.value;
    parentPicker.innerHTML = '<option value="">Top level</option>' + options;
    parentPicker.value = selectedParent;
  }

  function renderCategoryList(categories) {
    const list = document.getElementById('categoryManagerList');
    const errorHtml = categoryError
      ? `<div class="topic-due overdue" style="display:inline-block;margin-bottom:10px">${escapeHtml(categoryError)}</div>`
      : '';
    if (!categories.length) {
      list.innerHTML = errorHtml + '<div class="empty">No categories yet.</div>';
      return;
    }
    const { order } = buildCategoryTree(categories);
    list.innerHTML = errorHtml + order.map(({ id, category, depth }) => {
      const indent = depth * 16;
      if (editingCategoryId === id) {
        const parentOptions = order
          .filter((o) => o.id !== id)
          .map((o) => `<option value="${o.category.id}" ${o.category.id === category.parent_id ? 'selected' : ''}>${'  '.repeat(o.depth)}${escapeHtml(o.category.name)}</option>`)
          .join('');
        const projectOptions = todoistProjects
          ? todoistProjects.map((p) => `<option value="${p.id}" ${p.id === category.todoist_project_id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')
          : '';
        return `
          <div class="cat-edit-row" style="padding-left:${indent}px">
            <input type="text" class="cat-edit-name" value="${escapeHtml(category.name)}" />
            <select class="project-picker cat-edit-parent"><option value="">Top level</option>${parentOptions}</select>
            ${todoistProjects ? `<select class="project-picker cat-edit-project"><option value="">No override</option>${projectOptions}</select>` : ''}
            <button type="button" class="ghost" data-save-cat="${id}">Save</button>
            <button type="button" class="ghost" data-cancel-edit-cat="${id}">Cancel</button>
          </div>`;
      }
      if (confirmingCategoryArchiveId === id) {
        return `
          <div class="cat-row" style="padding-left:${indent}px">
            <span>${escapeHtml(category.name)}</span>
            <div class="archive-confirm-row">
              <button type="button" class="archive-confirm" data-confirm-cat-archive="${id}">Delete?</button>
              <button type="button" class="archive-cancel" data-cancel-cat-archive="${id}">Cancel</button>
            </div>
          </div>`;
      }
      const projectName = category.todoist_project_id ? (projectsById[category.todoist_project_id] || category.todoist_project_id) : null;
      return `
        <div class="cat-row" style="padding-left:${indent}px">
          <span class="cat-name" data-edit-cat="${id}">${escapeHtml(category.name)}${projectName ? ` <span style="color:var(--text-dim);font-size:12px">→ ${escapeHtml(projectName)}</span>` : ''}</span>
          <button type="button" class="archive-btn" data-archive-cat="${id}" title="Archive">&times;</button>
        </div>`;
    }).join('');
  }

  function renderCategoryManager(categories) {
    lastCategories = categories;
    renderCategoryPickers(categories);
    renderCategoryList(categories);
  }

  async function refresh() {
    const [topics, stats, categories] = await Promise.all([loadTopics(), loadStats(), loadCategories()]);
    renderTopics(topics, categories);
    renderHeatmap(stats);
    renderCategoryManager(categories);
    refreshCalendar();
  }

  document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('titleInput');
    const title = input.value.trim();
    if (!title) return;
    const picker = document.getElementById('projectPicker');
    const categoryPicker = document.getElementById('categoryPicker');
    await addTopic(title, picker.style.display !== 'none' ? picker.value : undefined, categoryPicker.value);
    input.value = '';
    refresh();
  });

  (async () => {
    const projects = await loadTodoistProjects();
    if (!projects || !projects.length) return;
    todoistProjects = projects;
    projectsById = Object.fromEntries(projects.map((p) => [p.id, p.name]));
    const picker = document.getElementById('projectPicker');
    picker.innerHTML = projects
      .map((p) => `<option value="${p.id}">${escapeHtml(p.name)}</option>`)
      .join('');
    const defaultIdx = projects.findIndex((p) => p.name === 'Steady');
    if (defaultIdx >= 0) picker.selectedIndex = defaultIdx;
    picker.style.display = '';
    const categoryTodoistPicker = document.getElementById('categoryTodoistPicker');
    categoryTodoistPicker.innerHTML = '<option value="">No override</option>' + projects
      .map((p) => `<option value="${p.id}">${escapeHtml(p.name)}</option>`)
      .join('');
    categoryTodoistPicker.style.display = '';
    refresh(); // re-render so any already-loaded topics/categories pick up project names
  })();

  document.getElementById('addCategoryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const nameInput = document.getElementById('categoryNameInput');
    const name = nameInput.value.trim();
    if (!name) return;
    const parentPicker = document.getElementById('categoryParentPicker');
    const todoistPicker = document.getElementById('categoryTodoistPicker');
    await addCategory(name, parentPicker.value, todoistPicker.style.display !== 'none' ? todoistPicker.value : undefined);
    nameInput.value = '';
    refresh();
  });

  document.getElementById('categoryManagerList').addEventListener('click', async (e) => {
    // .closest() everywhere here, not e.target directly — several of these
    // targets (e.g. a category name with a "→ ProjectName" hint span
    // nested inside it) have child markup a click can land on instead of
    // the element carrying the data attribute.
    const editEl = e.target.closest('[data-edit-cat]');
    if (editEl) {
      editingCategoryId = Number(editEl.dataset.editCat);
      categoryError = null;
      renderCategoryList(lastCategories);
      return;
    }
    const cancelEditEl = e.target.closest('[data-cancel-edit-cat]');
    if (cancelEditEl) {
      editingCategoryId = null;
      renderCategoryList(lastCategories);
      return;
    }
    const saveEl = e.target.closest('[data-save-cat]');
    if (saveEl) {
      const id = Number(saveEl.dataset.saveCat);
      const row = saveEl.closest('.cat-edit-row');
      const name = row.querySelector('.cat-edit-name').value.trim();
      if (!name) return;
      const parentId = row.querySelector('.cat-edit-parent').value;
      const projectPicker = row.querySelector('.cat-edit-project');
      const todoistProjectId = projectPicker ? projectPicker.value : '';
      const result = await updateCategory(id, { name, parent_id: parentId || null, todoist_project_id: todoistProjectId || null });
      if (result && result.error) {
        categoryError = result.error;
        renderCategoryList(lastCategories);
        return;
      }
      editingCategoryId = null;
      categoryError = null;
      refresh();
      return;
    }
    const archiveEl = e.target.closest('[data-archive-cat]');
    if (archiveEl) {
      confirmingCategoryArchiveId = Number(archiveEl.dataset.archiveCat);
      categoryError = null;
      renderCategoryList(lastCategories);
      return;
    }
    const cancelArchiveEl = e.target.closest('[data-cancel-cat-archive]');
    if (cancelArchiveEl) {
      confirmingCategoryArchiveId = null;
      renderCategoryList(lastCategories);
      return;
    }
    const confirmArchiveEl = e.target.closest('[data-confirm-cat-archive]');
    if (confirmArchiveEl) {
      const result = await archiveCategory(Number(confirmArchiveEl.dataset.confirmCatArchive));
      confirmingCategoryArchiveId = null;
      if (!result.ok) {
        categoryError = result.error;
        renderCategoryList(lastCategories);
        return;
      }
      categoryError = null;
      refresh();
    }
  });

  document.getElementById('calPrev').addEventListener('click', () => { calMonth = shiftMonth(calMonth, -1); selectedCalDay = null; refreshCalendar(); });
  document.getElementById('calNext').addEventListener('click', () => { calMonth = shiftMonth(calMonth, 1); selectedCalDay = null; refreshCalendar(); });

  document.getElementById('calGrid').addEventListener('click', (e) => {
    const cell = e.target.closest('.cal-day[data-date]');
    if (!cell) return;
    const date = cell.dataset.date;
    selectedCalDay = selectedCalDay === date ? null : date;
    renderCalendar({ month: calMonth, days: calDays });
    renderCalDetail();
  });

  document.getElementById('calDetail').addEventListener('click', async (e) => {
    if (e.target.dataset.detailReview === undefined) return;
    const id = e.target.dataset.id;
    const q = Number(e.target.dataset.q);
    await reviewTopic(useLocal ? Number(id) : id, q);
    refresh();
  });

  document.getElementById('topicList').addEventListener('click', async (e) => {
    const archiveId = e.target.dataset.archive;
    if (archiveId) {
      confirmingArchiveId = Number(archiveId);
      renderTopics(lastTopics);
      return;
    }
    const confirmId = e.target.dataset.confirmArchive;
    if (confirmId) {
      await archiveTopic(useLocal ? Number(confirmId) : confirmId);
      confirmingArchiveId = null;
      refresh();
      return;
    }
    const cancelId = e.target.dataset.cancelArchive;
    if (cancelId) {
      confirmingArchiveId = null;
      renderTopics(lastTopics);
      return;
    }
    const toggleId = e.target.dataset.toggle;
    if (toggleId) {
      document.getElementById(`qrow-${toggleId}`).classList.toggle('open');
      return;
    }
    const q = e.target.dataset.q;
    const id = e.target.dataset.id;
    if (q !== undefined) {
      await reviewTopic(useLocal ? Number(id) : id, Number(q));
      refresh();
    }
  });

  refresh();
</script>
</body>
</html>
